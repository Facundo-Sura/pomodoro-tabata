  <line x1="24" y1="26" x2="31" y2="26" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="26" r="2" fill="#e2e2e8"/>
  <!-- Checkmark (productivity done!) -->
